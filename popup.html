<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PhishGuard</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        width: 340px; margin: 0; font-family: system-ui, -apple-system, sans-serif;
        background: #0b1220; color: #e5e7eb;
      }
      header {
        display: flex; align-items: center; gap: 10px; padding: 14px 16px;
        background: linear-gradient(135deg, #1e3a8a, #2563eb);
      }
      header img { width: 28px; height: 28px; border-radius: 6px; }
      header h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: .2px; }
      header p { margin: 0; font-size: 11px; opacity: .85; }
      .section { padding: 14px 16px; border-bottom: 1px solid #1f2937; }
      .verdict { display: flex; align-items: center; gap: 10px; }
      .dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
      .v-safe { background: #16a34a; } .v-suspicious { background: #f59e0b; }
      .v-dangerous { background: #dc2626; } .v-unknown { background: #6b7280; }
      .v-label { font-weight: 700; font-size: 14px; }
      .url { font-size: 11px; color: #9ca3af; word-break: break-all; margin-top: 4px; }
      .stats { display: flex; gap: 8px; margin-top: 10px; }
      .stat { flex: 1; background: #111827; border: 1px solid #1f2937; border-radius: 8px; padding: 8px; text-align: center; }
      .stat b { display: block; font-size: 16px; }
      .stat span { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; }
      button {
        width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer;
        background: #2563eb; color: white; font-weight: 600; font-size: 13px;
      }
      button.secondary { background: #1f2937; color: #e5e7eb; }
      button + button { margin-top: 8px; }
      input {
        width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #1f2937;
        background: #0f172a; color: #e5e7eb; font-size: 12px; margin-top: 6px;
      }
      label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; }
      .small { font-size: 11px; color: #9ca3af; margin-top: 6px; }
      a { color: #60a5fa; }
      .hist { max-height: 140px; overflow: auto; }
      .hrow { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px dashed #1f2937; font-size: 11px; }
      .hrow:last-child { border: none; }
      .hrow .url { margin: 0; flex: 1; color: #d1d5db; }
    </style>
  </head>
  <body>
    <header>
      <img src="icon.png" alt="PhishGuard" />
      <div>
        <h1>PhishGuard</h1>
        <p>Real-time phishing protection</p>
      </div>
    </header>

    <div class="section">
      <div class="verdict">
        <div id="dot" class="dot v-unknown"></div>
        <div>
          <div id="vlabel" class="v-label">Scanning…</div>
          <div id="vurl" class="url">—</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><b id="s-mal">0</b><span>Malicious</span></div>
        <div class="stat"><b id="s-sus">0</b><span>Suspicious</span></div>
        <div class="stat"><b id="s-harm">0</b><span>Harmless</span></div>
      </div>
      <div style="margin-top:10px">
        <button id="rescan">Re-scan this page</button>
      </div>
    </div>

    <div class="section">
      <label for="apikey">VirusTotal API key</label>
      <input id="apikey" type="password" placeholder="Paste your VT API key" />
      <div class="small">Get a free key at <a href="https://www.virustotal.com/gui/my-apikey" target="_blank">virustotal.com</a>.</div>
      <div style="margin-top:8px"><button id="save" class="secondary">Save key</button></div>
    </div>

    <div class="section">
      <label>Recent scans</label>
      <div id="history" class="hist"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
